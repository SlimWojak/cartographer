Q22:
  question_id: Q22
  question_text: "Multiple active PDAs in correct zone — which gates execution? (a) highest TF (b) nearest (c) most recent (d) first reached"
  script_used: calibrate_multi_pda.py
  trade_used: trade_003/005 (Dec 12 2025, EXPANSION BULLISH)
  olya_answer: |
    First valid PDA price reaches in correct zone = primary gate.
    If chain fails there, next deeper PDA cascades to primary.
    Daily and 4H are equal — proximity wins, not timeframe.
    H1 is execution-layer, not Map-layer.
    Overlapping PDAs flagged as confluence (metadata, not logic change).
  confidence: HIGH
  locked: true
  notes: |
    Three additions locked:
    1. CASCADE: chain fails at PDA → next deeper PDA becomes primary. Sorted by proximity.
    2. TF PARITY: Daily and 4H equal for gating. H1 feeds chain_evaluator, NOT pda_store.
    3. CONFLUENCE: overlapping daily+4H zones = metadata flag (confluence: bool, confluent_pdas: list).
       No scoring, no confidence number. Just a flag for Olya's information.

Q23:
  question_id: Q23
  question_text: "Can multiple PDAs be armed simultaneously? Or strictly one active PDA per execution window?"
  script_used: calibrate_multi_pda.py
  trade_used: trade_003/005 (Dec 12 2025, EXPANSION BULLISH)
  olya_answer: |
    YES — multiple PDAs can be active within current dealing range

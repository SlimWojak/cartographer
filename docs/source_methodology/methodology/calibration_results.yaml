Q2:
  question_id: Q2
  question_text: "Extreme candle — BODY or WICK of displacement extreme?"
  script_used: calibrate_dealing_range.py
  trade_used: trade_001 (Oct 1 2025, EXPANSION BEARISH)
  olya_answer: "WICK. Same rule — wick to wick, capture the whole move."
  confidence: HIGH
  locked: true
  notes: "Confirmed on TradingView. Option B: origin=1.18199 (wick high), extreme=1.16454 (wick low), EQ=1.17327."

Q3:
  question_id: Q3
  question_text: "Trend extension — does dealing range STRETCH, REPLACE, or PERSIST as original?"
  script_used: calibrate_extension.py
  trade_used: trade_001 (Oct 1 2025, EXPANSION BEARISH)
  olya_answer: "ROLLING — dealing range tracks pullback-to-displacement cycles within regime. Each new cycle supersedes the previous dealing range."
  confidence: HIGH
  locked: true
  notes: "Refined with CTO + Olya's advisor. Not stretch/replace/persist — it's a rolling cycle model."

Q4:
  question_id: Q4
  question_text: "Multi-leg campaigns — which leg defines the range? Most recent / largest / full campaign?"
  script_used: calibrate_extension.py
  trade_used: trade_001 (Oct 1 2025, EXPANSION BEARISH)
  olya_answer: |
    Origin = highest liquidity point before displacement.
    Sweep extreme (wick) if sweep occurs, pullback high (wick) if not.
    Extreme = wick of expansion extreme.
    Each new pullback-to-displacement cycle supersedes previous dealing range.
  confidence: HIGH
  locked: true
  notes: |
    Refined with CTO + Olya's advisor. Priority logic: sweep > pullback.
    Example: pullback high 1.1750, spike to 1.1780 takes highs, displacement down → origin = 1.1780.
    Maps directly to detect.py's existing sweep detection primitive.



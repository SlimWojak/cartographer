Q7:
  question_id: Q7
  question_text: "For a PDA to be 'in premium', must the ENTIRE zone be above equilibrium, or is midpoint / any overlap sufficient?"
  script_used: calibrate_pda_zone.py
  trade_used: trade_001 (Oct 1 2025, EXPANSION BEARISH)
  olya_answer: |
    PDA midpoint must be at or above equilibrium (bearish) /
    at or below (bullish). If PDA midpoint is in wrong zone → INVALID.
    If PDA straddles but midpoint is in correct zone → VALID.
  confidence: HIGH
  locked: true
  notes: "config_value: zone_requirement = midpoint"

Q8:
  question_id: Q8
  question_text: "If a PDA straddles equilibrium (top in premium, bottom in discount), is it valid for execution?"
  script_used: calibrate_pda_zone.py
  trade_used: trade_001 (Oct 1 2025, EXPANSION BEARISH)
  olya_answer: |
    VALID — but with two constraints:
    1. Entry must be taken from the premium portion (above EQ for shorts,
       below EQ for longs). System must NOT enter from wrong side of EQ.
    2. Straddle setups require clean LTF confirmation
       (sweep + MSS + displacement — no weak chains).
  confidence: HIGH
  locked: true
  notes: |
    Implementation: Gate classifies PDA location by MIDPOINT vs equilibrium.
    Midpoint above EQ → PREMIUM. Midpoint below EQ → DISCOUNT. Midpoint at EQ → VALID but strong chain required.
    Additional constraint: ENTRY PRICE (OTE from chain) must be on correct side of EQ.
    Checked at intent_builder level, not gate level. Gate arms the PDA, intent_builder validates entry.



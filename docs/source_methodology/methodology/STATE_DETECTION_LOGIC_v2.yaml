# ─────────────────────────────────────────────────────────────────────────────
# 1. CORE PRINCIPLE
# ─────────────────────────────────────────────────────────────────────────────

core_principle:

  unified_event_cycle: |
    The SAME event cycle exists on ALL timeframes. Only scale differs.
    Monthly, weekly, daily, 4H, 1H, 15m, 5m — identical primitive logic.
    HTF event-cycle phase determines DIRECTION PERMISSION.
    LTF event-cycle phase determines EXECUTION TIMING.
    Chain evaluator determines ENTRY.

  what_olya_does: |
    "The system first decides what the daily market state is.
     That state tells us which directions we are allowed to trade.
     Then the 15m/5m strategy executes the trade the same way every time."
    — Olya, verbatim

  what_state_actually_is: |
    State is NOT a label (trending / pullback / neutral).
    State is the POSITION OF PRICE within the HTF event cycle.
    "Trending" = HTF is in EXPANSION phase.
    "Pullback" = HTF is in RETRACE phase.
    "Neutral" = HTF is in RANGE / UNCLEAR phase.
    Same facts, better framing. Computable from locked primitives.

  design_constraints:
    - "State derived from primitive events, not assigned as labels"
    - "State updates on structural events, not fixed time cadence"
    - "State classifier stays LEAN — 3 phases, observable facts, no prediction"
    - "Single event model across all TFs — no separate HTF logic"
    - "HTF provides permission only. LTF provides timing. Chain provides entry."
    - "No smart bias engine. No directional forecasting."

# ─────────────────────────────────────────────────────────────────────────────
# 2. THE UNIVERSAL EVENT CYCLE
# ─────────────────────────────────────────────────────────────────────────────

event_cycle:

  description: |
    Six phases that describe where price is within a structural move.
    Applies identically on every timeframe. Detected from locked L1 primitives.

  phases:

    1_LIQUIDITY_BUILD:
      description: "Liquidity accumulating. Equal highs/lows forming. Range developing."
      observable_primitives:
        - HTF_EQH_EQL forming (status=UNTOUCHED)
        - Session liquidity classification = CONSOLIDATION_BOX
        - No recent displacement
      implication: "Pre-conditions developing. No trade yet."

    2_RAID:
      description: "Liquidity swept. Price has breached a key level."
      observable_primitives:
        - LiquiditySweep event (qualified_sweep=true)
      implication: "Attention. Potential setup initiating."

    3_CONFIRMATION:
      description: "Structure has shifted. Displacement confirms directional commitment."
      observable_primitives:
        - MSS (break_type=REVERSAL, displacement_grade=VALID)
        - Displacement event (quality_grade=VALID)
        - FVG created by displacement
      implication: "Directional bias DEFINED. Direction permission granted."

    4_EXPANSION:
      description: "Price expanding in confirmed direction. Moving away from origin."
      observable_primitives:
        - Sustained displacement in confirmed direction
        - Structure continuing (HH/HL or LL/LH on this TF)
        - Price moving away from MSS origin
      implication: "Do not chase. Wait for retrace."

    5_RETRACE:
      description: "Price pulling back into imbalance zone. Returning to FVG / OTE / OB."
      observable_primitives:
        - Price entering FVG zone (price_inside check)
        - Price reaching OTE levels (0.618-0.79 of expansion range)
        - OB zone reached
      implication: "EXECUTION WINDOW. This is where entries happen."

    6_POST_MOVE:
      description: "Move exhausted. Multiple sweeps, weak displacement, or HTF target reached."
      observable_primitives:
        - Multiple sweep events without displacement follow-through
        - Displacement weakening (quality_grade=WEAK)
        - Price reached HTF target level
      implication: "Avoid. Or prepare for reversal context on higher TF."

  cycle_properties:
    - "Phases are sequential but not rigid — market can skip phases"
    - "Cycle repeats fractally on every TF"
    - "Phase detection uses locked L1 primitives only"
    - "Phase transitions triggered by primitive events, not time"

# ─────────────────────────────────────────────────────────────────────────────
# 3. LAYERED ARCHITECTURE
# ─────────────────────────────────────────────────────────────────────────────

architecture:

  layer_1_primitives:
    role: "Event detection"
    scope: "All timeframes"
    status: "LOCKED (13/13 vLOCK)"
    output: "Per-bar, per-TF primitive events with lifecycle state"
    note: "HTF L1.5 params PROPOSED for Daily/4H. Calibration required."

  layer_2_htf_phase:
    role: "Direction permission"
    scope: "Daily primary. 4H/1H secondary (for RANGE phase delegation)."
    input: "L1 primitives on Daily / 4H / 1H bars"
    output:
      htf_phase: "EXPANSION | RETRACE | RANGE"
      direction_permission: "WITH_EXPANSION | COUNTER_ALLOWED | BOTH"
      authority_tf: "Daily | 4H | 1H"
    update_trigger: "Structural primitive event (MSS, sweep, displacement) on HTF"
    design_rule: "Computes phase from event-cycle position. Does NOT predict."

  layer_3_ltf_phase:
    role: "Execution timing"
    scope: "15m / 5m"
    input: "L1 primitives on execution TF + direction_permission from Layer 2"
    output:
      ltf_phase: "PRE_RAID | RAID | CONFIRMATION | EXPANSION | RETRACE | POST_MOVE"
    update_trigger: "Every relevant primitive event on execution TF"
    design_rule: "Tracks progression toward executable setup within permitted direction."
    setup_regime: |
      The LTF event cycle carries setup regime classification via the MSS
      break_type tag (already in L1 output):
        REVERSAL: MSS breaks against prior LTF swing structure
                  (e.g., sweep of high → bearish MSS against bullish structure)
        CONTINUATION: MSS breaks with prior LTF swing structure
                  (e.g., pullback into FVG → bullish MSS extending bullish structure)
      Same execution chain fires in both regimes. The difference is local
      structural context — not direction, not timing, but the relationship
      between the MSS and the prior LTF trend.
      L2 determines direction permission. L3 determines setup type.
      Both feed the five-factor checklist in S65.
    note: "Maps to chain evaluator step progression. Same logic, phase labels added."

  layer_4_chain_evaluator:
    role: "Entry trigger"
    scope: "Minutes"
    input: "LTF primitives + direction_permission + LTF phase"
    output: "FIRE / NO_FIRE + diagnostics"
    status: "Already built in Strategy Designer"
    design_rule: "Universal execution chain. Same primitives, same logic, every trade."

  layer_independence:
    - "Layer 2 gates Layer 3 (direction permission filters which setups to watch)"
    - "Layer 3 enriches Layer 4 (phase labels on chain output)"
    - "No upward dependency — lower layers never modify higher layers"
    - "Each layer is testable independently"

# ─────────────────────────────────────────────────────────────────────────────
# 4. HTF PHASE DETECTION — DAILY PRIMARY
# ─────────────────────────────────────────────────────────────────────────────

htf_phase_detection:

  description: |
    Determines which event-cycle phase the daily timeframe is in.
    Uses locked L1 primitives on daily bars. Phase transitions are
    event-driven: a new phase begins when a structural primitive fires.

  # ─── PHASE: EXPANSION ───
  daily_expansion:
    name: "HTF_EXPANSION_PHASE"
    maps_to: "What Olya calls 'clear daily direction' (State 1)"

    detection:
      primary_signal: |
        Most recent daily MSS exists.
        No opposing daily MSS has fired since.
        Displacement confirmed in MSS direction.
      supporting_signals:
        - Daily structure continuing in MSS direction (HH/HL or LL/LH)
        - Active displacement events in last N daily bars
        - FVG created by the displacement is still ACTIVE
      confidence_decay: |
        MSS holds until opposing MSS fires (invalidation-based, NOT age-gated).
        Confidence tags for L2 use:
          HIGH: MSS age <= 5 daily bars AND displacement active
          MEDIUM: MSS age 6-15 daily bars, no opposing MSS, structure intact
          LOW: MSS age > 15 daily bars, structure intact but momentum faded
        Confidence does NOT change the phase. Phase = EXPANSION until
        opposing MSS fires or structure breaks.

    direction_permission:
      rule: "WITH_EXPANSION only"
      bearish_expansion: "SHORT entries only"
      bullish_expansion: "LONG entries only"

    h1_requirement: |
      1H structure must be ALIGNED or NEUTRAL relative to daily.
      If 1H is COUNTER to daily → transitions to RETRACE phase.

      Alignment check (v2.1 — swing-primary):
        ALIGNED: 1H swing structure consistent with daily direction,
                 OR no counter pattern (NEUTRAL).
        COUNTER: 1H swing structure shows HH/HL or LL/LH counter to daily,
                 persisted >= 3 bars, with displacement-quality counter move.

      Kill zone realignment exception (v2.1):
        Within LOKZ (02:00-05:00) or NYOKZ (07:00-10:00):
          IF daily phase is EXPANSION in direction D
          AND current phase is RETRACE (1H counter)
          AND 15m or 5m MSS fires in direction D
          AND no new 1H MSS has fired in the opposing direction in the last
              2 hours (i.e., the 1H counter-move has gone quiet):
            THEN: h1_alignment transitions to ALIGNED
            Phase transitions: RETRACE → EXPANSION

        This exception ONLY applies within kill zones. Outside kill zones,
        1H swing structure realignment is still required. Prevents random
        15m MSS noise from flipping the phase during non-trade hours.

        Rationale (from forensic analysis 2026-03-15):
          Trade 1 (Oct 1): 1H had bullish MSS at 00:00. No 1H bearish MSS
          before the 03:30 execution. But 15m bearish MSS at 03:30 in LOKZ
          was the execution signal. Execution TF structure provides sufficient
          evidence that the counter-move has exhausted within kill zones.

  # ─── PHASE: RETRACE ───
  daily_retrace:
    name: "HTF_RETRACE_PHASE"
    maps_to: "What Olya calls 'pullback against direction' (State 2)"

    detection:
      primary_signal: |
        Daily EXPANSION phase is active (MSS exists, not invalidated).
        BUT 1H structure has turned counter-directional.
      1h_counter_detection: |
        SWING STRUCTURE PRIMARY, MSS CONFIRMING (v2.1 refinement):

        1H bars show HH + HL pattern (bullish) or LL + LH pattern (bearish)
        counter to daily direction. Detection uses swing structure as primary
        signal — MSS confirms but does not gate.

        Requirements (ALL must hold):
          a) 1H swing structure shows counter-directional pattern
          b) Structure persists >= 3 consecutive 1H bars (anti-noise)
          c) At least one displacement-quality move exists in the counter
             direction (body_ratio >= 0.60, quality_grade >= VALID)

        The displacement-quality gate ensures slow grinds without commitment
        do NOT trigger RETRACE. Only genuine counter-directional structure counts.

        Rationale (from forensic analysis 2026-03-15):
          Trade 2 (Sept 29): 1H showed bullish HH/HL counter to daily bearish,
          but no explicit 1H bullish MSS fired. MSS-first would miss the RETRACE.
          Swing-primary catches it correctly. The displacement gate preserves the
          principle: uncommitted drift is not a real counter-move. Olya reads
          structure from the chart before MSS formally confirms.

        Supersedes: MSS-first h1_counter_detection (v2.0).
        Provenance: HTF forensic analysis Trade 2 gap finding.
      spatial_confirmation: |
        Price is moving TOWARD a daily imbalance zone (daily FVG, daily OB)
        in the premium/discount area counter to the daily expansion direction.
        Example: daily bearish expansion → price retracing UP toward daily
        bearish FVG in premium.

    h4_counter_pathway:
      description: |
        v2.4 addition: RETRACE can also trigger from a 4H structural counter-move.
        RETRACE = daily_direction_active AND (h1_counter OR h4_counter)

      h4_counter_detection: |
        h4_counter = TRUE when ALL of the following hold:
          1. A 4H MSS exists in the OPPOSING direction to the active daily MSS
          2. That 4H MSS fired AFTER the current daily MSS timestamp
             (prevents stale pre-expansion 4H structure from false-triggering)
          3. Invalidation check: daily-aligned 4H MSS events after the first
             counter-MSS must have >= structural weight (event count) than
             counter events to invalidate. A single 4H bounce does NOT erase
             a multi-day, multi-event counter structure.

      parameters:
        h4_counter_persistence_bars: { default: 1, sweep: [1, 2] }
        h4_counter_displacement_required: { default: false, sweep: [true, false] }

      rationale: |
        Trade 014 (Feb 4, 2026): daily bullish MSS Jan 22. 4H bearish MSS
        Jan 30 + Feb 2 (2 events, 4 days). 4H bullish MSS Feb 3 20:00
        (1 event, 11 hours). h1 bullish MSS Feb 3 23:00. Without h4_counter,
        system sees EXPANSION (h1 aligned, no h1 counter). With h4_counter,
        the 2-event bearish structure outweighs the 1-event bullish bounce →
        RETRACE correctly detected. Olya reads "daily bullish in bearish
        pullback state" — exactly what this pathway captures.

      provenance: "ATR warmup fix surfaced daily MSS, exposing this edge case (2026-03-19)"

    direction_permission:
      rule: "COUNTER_ALLOWED"
      detail: |
        Counter-direction trades permitted (trading the retrace).
        Example: daily bearish + retrace → LONG entries allowed.
        The counter-trade targets the daily imbalance zone.
      note: |
        WITH_EXPANSION trades are also valid during retrace
        (the retrace may exhaust and the expansion resumes).
        Practical permission: BOTH, but system knows the context.

    transition_back_to_expansion: |
      The pathway that triggered RETRACE determines exit conditions:
      IF h1_counter ONLY: h1 realignment with daily restores EXPANSION (existing rule).
      IF h4_counter: requires 4H to realign with daily (new 4H MSS in daily direction
        OR counter-MSS invalidated by equal/greater structural weight).
        h1 realignment alone does NOT exit RETRACE when 4H is counter.
      IF BOTH h1 AND h4: 4H rules apply (higher TF precedence for exit).
      Subject to transition lockout (minimum 2x 1H bars, from Opus review).

    duration_guard: |
      If 1H remains counter for >= 3 consecutive daily bars,
      the daily expansion assumption is weakening.
      Transition to RANGE phase for reassessment.
      (From Opus review Q3: prolonged counter-movement = daily trend suspect.)

  # ─── PHASE: RANGE / UNCLEAR ───
  daily_range:
    name: "HTF_RANGE_OR_UNCLEAR_PHASE"
    maps_to: "What Olya calls 'daily neutral at decision area' (State 3)"

    detection:
      primary_signal: |
        No active daily MSS (no MSS fired, or last MSS has been
        invalidated by opposing MSS).
      OR_with_qualifier: |
        Daily MSS exists BUT price has reached a significant HTF level
        AND daily momentum has stalled.
        "Reached key level" requires BOTH conditions (from Opus review):
          a) price_inside(monthly.FVG.active) OR price_inside(weekly.FVG.active)
             OR price_at(HTF_EQH_EQL) OR price_at(PWH_PWL)
          b) No daily displacement event in last 3 daily bars (momentum stall)
        Key level WITHOUT momentum stall = still EXPANSION (strong trend
        passing through a level does not demote to RANGE).

    direction_permission:
      rule: "BOTH directions allowed"
      authority_delegation: |
        Direction determined by 4H or 1H — whichever has the most
        recent MSS event (from Opus review Q5: computable authority
        selection, not ambiguous "clearer structure").
        IF h4 most_recent_MSS is newer than h1 most_recent_MSS:
          authority_tf = 4H, direction = h4 MSS direction
        ELSE:
          authority_tf = 1H, direction = h1 MSS direction
        IF neither has active MSS:
          direction = WAIT (no execution permitted)

    transition_to_expansion: |
      New daily MSS fires → EXPANSION phase established.
      Direction = new MSS direction.

  # ─── INDEPENDENT STRATEGIES ───
  state_independent:
    name: "BYPASSES HTF PHASE ENTIRELY"
    description: |
      Some strategies (Asia Range Scalp) have their own pre-conditions
      and do not use the HTF phase detector. The phase detector is
      bypassed. These strategies coexist alongside phase-gated strategies.
    example: "Trade 4 (Oct 28): Asia Range Scalp — own pre-conditions, no daily context"

  # ─── DAILY DIRECTION MECHANISMS (v2.3) ───
  daily_direction_mechanisms:
    description: |
      compute_daily_structure_direction() uses a 3-mechanism hierarchy.
      First non-NEUTRAL result wins. If all three return NEUTRAL, daily
      is genuinely unclear → RANGE phase.

    mechanism_1_swing_structure:
      priority: PRIMARY
      signal: "Daily SwingPoints sequence: HH/HL → BULLISH, LL/LH → BEARISH"
      status: "Built. Not yet contributing — blocked on ATR(14) lookback pre-seeding (daily swings too sparse without warmup)."
      parameters:
        swing_lookback_count: { default: 4, sweep: [3, 4, 5] }
        minimum_swings_required: { default: 2, sweep: [2, 3] }
        swing_recency_days: { default: 30 }
      note: |
        This is what Olya reads first: "is the daily chart making HH/HL or LL/LH?"
        Uses existing locked L1 SwingPoints detection output. Does NOT re-derive from candles.

    mechanism_2_relaxed_mss_proxy:
      priority: SECONDARY
      signal: "4H MSS with relaxed daily displacement confirmation"
      status: "Active. Currently carrying all 14 validated trades."
      parameters:
        qualifying_daily_bars: { default: 1, sweep: [1, 2], note: "was 2 in v2.1" }
        mss_window_days: { default: 10, sweep: [7, 10, 14], note: "was 5 in v2.1" }
        body_ratio_threshold: { default: 0.55, sweep: [0.50, 0.55, 0.60], note: "was 0.60 in v2.1" }
        daily_bar_range_min: { default: 0.0040 }
      changes_from_v2_1: |
        qualifying_daily_bars: 2 → 1 (most valid moves don't produce 2 extreme candles)
        mss_window_days: 5 → 10 (Dec 4 MSS → Dec 12 trade = 8 days, old window missed it)
        body_ratio_threshold: 0.60 → 0.55 (slight relaxation to catch more valid displacement)

    mechanism_3_h4_sustained_structure:
      priority: TERTIARY
      signal: "4H sustained HH/HL or LL/LH with displacement-quality move"
      status: "Built. Not triggered on any current trade (mechanism 2 catches all)."
      parameters:
        h4_structure_lookback_days: { default: 5, sweep: [5, 7] }
        h4_minimum_swings: { default: 3, sweep: [2, 3] }
      note: |
        Safety net for cases where daily swings are sparse AND 4H MSS proxy
        gives NEUTRAL. Uses richer 4H swing data (~7.8 swings/week).

    resolution_logic: |
      Run mechanisms in order. First non-NEUTRAL result wins.
      Output: direction (BULLISH/BEARISH/NEUTRAL), method, confidence (HIGH/MEDIUM/LOW).
      All parameters are sweepable via AutoResearch (tools/autoresearch/sweep.py).

  # ─── NO TRADE ───
  no_trade:
    name: "UNDEFINED — no execution permitted"
    detection: |
      Daily is in RANGE phase AND no 4H/1H authority can be established
      (no MSS on either TF). Or daily is in POST_MOVE with exhaustion signals.
    action: "Wait for structure."

# ─────────────────────────────────────────────────────────────────────────────
# 5. HTF FACT COMPUTATIONS — SUPPORTING THE PHASE DETECTOR
# ─────────────────────────────────────────────────────────────────────────────

htf_facts:

  description: |
    Boolean/structured facts computed from locked L1 primitives on HTF bars.
    Phase detector consumes these facts. Facts are deterministic queries.

  # ─── STRUCTURE DIRECTION (per TF) ───
  structure_direction:
    applies_to: [monthly, weekly, daily, 4H, 1H]
    computation: |
      PRIMARY: most recent MSS direction on this TF.
        MSS holds until opposing MSS fires (invalidation-based).
        No age cutoff. Age is confidence metadata only.
        IF no MSS ever fired on this TF → fall through to SECONDARY.
      SECONDARY: swing structure pattern on this TF.
        IF last 3+ bars show HH + HL → BULLISH
        IF last 3+ bars show LL + LH → BEARISH
        ELSE → NEUTRAL
    output: "BULLISH | BEARISH | NEUTRAL"
    confidence: "HIGH (MSS-based) | MEDIUM (structure-based) | LOW (ambiguous)"
    primitives: [MSS, SwingPoints]
    htf_param_note: |
      SwingPoints N and height_filter PROPOSED for Daily (N=2, height=15pip).
      SwingPoints N and height_filter PROPOSED for 4H (N=2, height=8pip).
      Weekly/Monthly: UNDEFINED (insufficient bar data in current pipeline).
      MSS body_ratio and confirmation_window PROPOSED for HTF (0.65/1).
      See Section 12: PROPOSED HTF PARAMETERS for full candidate values.
      BLOCKED_BY: Olya visual confirmation session.

  # ─── KEY LEVEL PROXIMITY ───
  at_key_level:
    computation: |
      price_inside(monthly.FVG, state=ACTIVE)
      OR price_inside(weekly.FVG, state=ACTIVE)
      OR price_within_tolerance(HTF_EQH_EQL, status=UNTOUCHED, tolerance=ATR_daily*0.5)
      OR price_within_tolerance(PWH_PWL, tolerance=ATR_daily*0.5)
    output: "bool + level details"
    primitives: [FVG_monthly, FVG_weekly, HTF_EQH_EQL, ReferenceLevels]
    note: |
      Monthly FVGs are rare and enormous. This fact fires infrequently on monthly.
      Practical heavy lifting done by weekly FVG, HTF_EQH_EQL, PWH_PWL.
      (From Opus review: monthly FVG is operationally vacuous most of the time.)

  # ─── MOMENTUM STATUS ───
  momentum_active:
    computation: |
      EXISTS(this_tf, Displacement, direction=structure_direction, age_bars <= 3)
    output: "bool"
    primitives: [Displacement]
    used_by: "State 3 momentum-stall qualifier. Key level + NO momentum = RANGE."

  # ─── ACTIVE IMBALANCE ZONES ───
  active_fvg:
    computation: |
      EXISTS(this_tf, FVG, state=ACTIVE, direction=structure_direction)
    output: "bool + zone boundaries (top, bottom, CE)"
    primitives: [FVG]
    used_by: "RETRACE phase detection — price moving toward active imbalance"

  # ─── PREMIUM / DISCOUNT ───
  premium_discount:
    computation: |
      IF most recent MSS exists on this TF:
        dealing_range_high = displacement_extreme_candle.body_high
        dealing_range_low = MSS_origin_candle.body_low  (bearish)
        OR dealing_range_high = MSS_origin_candle.body_high  (bullish)
        OR dealing_range_low = displacement_extreme_candle.body_low
        midpoint = (dealing_range_high + dealing_range_low) / 2
      ELSE:
        dealing_range = [recent_swing_low, recent_swing_high] (fallback)
        midpoint = (swing_high + swing_low) / 2
      IF price > midpoint: PREMIUM
      ELSE IF price < midpoint: DISCOUNT
      ELSE: EQUILIBRIUM
    output: "PREMIUM | DISCOUNT | EQUILIBRIUM"
    primitives: [MSS (origin_candle), Displacement (extreme_candle), SwingPoints]
    note: |
      MSS-anchored dealing range preferred (consistent with OTE in vLOCK).
      Swing fallback only when no MSS exists. (From Opus review.)

  # ─── INTRADAY ALIGNMENT ───
  h1_alignment:
    computation: |
      SWING STRUCTURE PRIMARY, MSS CONFIRMING (v2.1):

      Step 1 — Determine 1H structure direction:
        PRIMARY: 1H swing structure pattern.
          IF last 3+ 1H bars show HH + HL → BULLISH
          IF last 3+ 1H bars show LL + LH → BEARISH
          ELSE → NEUTRAL
        CONFIRMING: 1H MSS direction (if present, increases confidence).

      Step 2 — Compare against daily_structure_direction:
        ALIGNED: 1H structure same direction as daily (or NEUTRAL)
        COUNTER: 1H structure opposite to daily, ALL of:
          a) Pattern persists >= 3 consecutive 1H bars
          b) At least one displacement-quality move in counter direction
             (body_ratio >= 0.60, quality_grade >= VALID)
        NOISE: opposite direction but < 3 bars persistence OR
               no displacement-quality move (ignore)

      Step 3 — Kill zone realignment exception:
        Within active kill zone (LOKZ 02:00-05:00 or NYOKZ 07:00-10:00):
          IF current h1_alignment == COUNTER
          AND 15m or 5m MSS fires in daily direction
          AND no new 1H MSS in opposing direction in last 2 hours:
            h1_alignment transitions to ALIGNED

    output: "ALIGNED | COUNTER | NOISE"
    primitives: [SwingPoints_1H, MSS_1H, Displacement_1H, MSS_15m, MSS_5m, MSS_daily]
    note: |
      v2.1 change: swing structure replaces MSS as primary signal.
      3-bar persistence + displacement gate prevents noise triggers.
      Kill zone exception allows execution-TF MSS to restore alignment
      when 1H counter-move has exhausted. (Forensic analysis 2026-03-15.)
    provenance: "HTF forensic analysis — Trade 1 and Trade 2 gap findings."

  # ─── UNTOUCHED LIQUIDITY LEVELS ───
  liquidity_levels_active:
    computation: |
      EXISTS(this_tf, HTF_EQH_EQL, status=UNTOUCHED)
      OR EXISTS(this_tf, ReferenceLevels [PWH/PWL], status=ACTIVE)
      OR EXISTS(this_tf, SessionLiquidity [Asia H/L], status=ACTIVE)
    output: "bool + level list with prices and types"
    primitives: [HTF_EQH_EQL, ReferenceLevels, SessionLiquidity]
    note: |
      Level lifecycle tracking (ACTIVE → SWEPT) is Gap 3 from core CTO.
      Zones have lifecycle. Levels need it too. Architecturally new concept.
      BLOCKED_BY: Level lifecycle implementation.

# ─────────────────────────────────────────────────────────────────────────────
# 6. PHASE TRANSITIONS
# ─────────────────────────────────────────────────────────────────────────────

phase_transitions:

  principle: |
    Phase transitions are event-driven. A phase changes when a structural
    primitive fires, not on a fixed clock. Daily bar close is the natural
    checkpoint where new daily primitives become available, but the
    transition logic is "new event occurred" not "time elapsed."

  transition_lockout:
    rule: |
      After any phase transition, hold new phase for minimum 2x 1H bars
      (2 hours) before allowing re-evaluation. Prevents whipsaw
      oscillation between EXPANSION and RETRACE on noisy 1H structure.
    source: "Opus review — anti-whipsaw mechanism"

  transitions:

    expansion_to_retrace:
      trigger: "1H alignment shifts from ALIGNED to COUNTER (with 3-bar persistence)"
      condition: "Daily MSS still active (not invalidated)"
      example: "Sept 26-29: daily bearish expansion, 1H turns bullish → RETRACE"

    retrace_to_expansion:
      trigger: "1H alignment shifts from COUNTER back to ALIGNED"
      condition: "Daily MSS still active"
      lockout: "2x 1H bars minimum before transition"
      paths:
        standard: |
          1H swing structure realigns with daily direction.
          Example: 1H starts making LL/LH again during daily bearish expansion.
        kill_zone_exception: |
          Within LOKZ or NYOKZ: 15m/5m MSS fires in daily direction
          AND no new 1H MSS in opposing direction in last 2 hours.
          The 1H counter-move has gone quiet; execution TF confirms realignment.
          Lockout still applies (2x 1H bars minimum in RETRACE before exception
          can fire — prevents immediate whipsaw).
          Example: Oct 1, 03:30 — 15m bearish MSS in LOKZ restores EXPANSION.
      example: "Oct 1: 1H counter exhausts, 15m MSS at 03:30 → back to EXPANSION"

    retrace_to_range:
      trigger: "1H counter-direction persists >= 3 consecutive daily bars"
      condition: "Daily expansion assumption weakening"
      example: "Prolonged pullback erodes confidence in daily trend → reassess"

    expansion_to_range:
      trigger: "Daily MSS invalidated (opposing daily MSS fires)"
      OR: "Price reaches key level AND momentum stalls (no displacement in 3 daily bars)"
      example: "Daily bearish trend reaches monthly FVG, displacement fades → RANGE"

    range_to_expansion:
      trigger: "New daily MSS fires"
      condition: "Displacement confirms the MSS"
      example: "Dec: daily neutral, new daily MSS bearish fires → EXPANSION bearish"

    any_to_post_move:
      trigger: "Multiple failed sweeps OR HTF target reached OR displacement exhaustion"
      condition: "Event-cycle has completed its structural move"
      action: "Avoid or prepare for reversal context on higher TF"

  oct_1_narrative:
    description: "Phase transitions Sept 24 → Oct 1 using v2.1 model"
    sequence:
      - "Sept 23-24: Daily bearish displacement (body 84%/66%, ATR 1.65x/1.97x)"
      - "Sept 24: Daily bearish MSS fires → EXPANSION phase (bearish)"
      - "Sept 26: 1H swing structure turns bullish (HH/HL), persists 3+ bars with displacement-quality move → RETRACE phase"
      - "Sept 29: Trade 2 — RETRACE phase, counter-direction LONG permitted (h1_alignment=COUNTER via swing structure)"
      - "Sept 30: 1H bullish momentum fading, EQH forming (liquidity building)"
      - "Oct 1 00:00: 1H bullish MSS fires (counter), but counter-move losing momentum"
      - "Oct 1 03:30: Kill zone realignment — 15m bearish MSS in LOKZ, no new 1H opposing MSS in 2hr → EXPANSION restored"
      - "Oct 1 03:30: Trade 1 — EXPANSION phase, WITH_EXPANSION SHORT"

# ─────────────────────────────────────────────────────────────────────────────
# 7. DIRECTION PERMISSION OUTPUT
# ─────────────────────────────────────────────────────────────────────────────

direction_permission:

  mapping:
    HTF_EXPANSION_PHASE:
      permission: WITH_EXPANSION_ONLY
      bearish_expansion: "SHORT entries only"
      bullish_expansion: "LONG entries only"
    HTF_RETRACE_PHASE:
      permission: COUNTER_ALLOWED
      detail: "Counter-direction trades permitted. With-expansion also valid."
      effective: BOTH
    HTF_RANGE_OR_UNCLEAR_PHASE:
      permission: BOTH
      authority: "Delegated to 4H/1H (most recent MSS wins authority)"
    STATE_INDEPENDENT:
      permission: "Determined by strategy pre-conditions (e.g., Asia Range Scalp)"
    UNDEFINED:
      permission: NONE

  consumption: |
    Direction permission is consumed by:
    - Strategy Designer chain evaluator (filters which chains to evaluate)
    - Future: Dexter backtester (filters candidate signals)
    - Future: Live trading system (gates execution)

# ─────────────────────────────────────────────────────────────────────────────
# 8. LTF EVENT CYCLE — EXECUTION PHASE TRACKING
# ─────────────────────────────────────────────────────────────────────────────

ltf_event_cycle:

  description: |
    Same event cycle as HTF, applied to 15m/5m execution timeframe.
    Tracks where price is within the current setup sequence.
    Direction filtered by HTF direction permission.

  phase_to_chain_mapping:
    PRE_RAID: "No chain steps matched. Watching for sweep."
    RAID: "Step 1 matched (sweep detected). Watching for MSS."
    CONFIRMATION: "Step 2 matched (MSS + displacement). Direction confirmed."
    EXPANSION: "Price expanding from MSS. Do not chase."
    RETRACE: "Price returning to imbalance. EXECUTION WINDOW. OTE / FVG / OB entry."
    POST_MOVE: "Setup exhausted. No new entries."

  integration_with_chain_evaluator: |
    The chain evaluator already tracks step progression.
    The event cycle adds PHASE LABELS to each state of the evaluator.
    When chain reaches RETRACE phase with all steps matched → FIRE.
    This is presentation enrichment on existing chain logic, not new architecture.


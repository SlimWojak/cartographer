part_a_runtime_critical:

  # ─── CRITICAL ──────────────────────────────────────────────────────────────

  - id: SW01_PDA_MITIGATION_INVERTED
    severity: CRITICAL
    class: semantic_drift
    found_by: [opus]
    affects: Map-gated path (DAILY_EXPANSION, all future strategies)
    spec_refs:
      - "calibration_results.yaml:Q14 — 'body closes beyond far edge = MITIGATED'"
      - "vLOCK:FVG:L1_state_machine — 'BOUNDARY_CLOSED: bar.close crosses opposite boundary'"
    code_refs:
      - "en1gma/context/pda_store.py:118-125"
      - "en1gma/context/map_engine.py:390-396"
      - "en1gma/tests/unit/test_map_engine.py:141-154 (test validates WRONG behavior)"
    description: |
      PDA mitigation direction is INVERTED for both bearish and bullish contexts.

      Code says:
        BEARISH direction → mitigated when close < zone_bottom
        BULLISH direction → mitigated when close > zone_top

      Correct per ICT / vLOCK:
        BEARISH FVG → mitigated when close > zone_top (retrace FILLS gap from below)
        BULLISH FVG → mitigated when close < zone_bottom (retrace FILLS gap from above)

      The code checks expansion-direction penetration, but mitigation means the
      imbalance was FILLED by price returning THROUGH the zone from the opposite side.

      Latent because 6/6 ground truth trades use REJECTED (via trade write-back),
      so the inverted mitigation never fires on PDAs that matter. But in bullish
      expansion, close > zone_top is trivially true → ALL touched bullish FVGs
      immediately mitigate → zero active PDAs → gate never arms.
    impact: |
      CAPITAL-CRITICAL for DAILY_EXPANSION going live in bullish regimes.
      Kills the PDA pool during replay, preventing gate arming, blocking valid trades.
    proposed_fix:
      - "Swap conditions in pda_store.py and map_engine.py"
      - "BEARISH → mitigated when close > zone_top"
      - "BULLISH → mitigated when close < zone_bottom"
      - "Fix test_pda_lifecycle_mitigation to validate correct behavior (see SW13)"
    requires_olya_input: true  # confirm mitigation = retrace fills, not expansion passes
    prior_ledger_ref: null  # NEW — not in BUG_LEDGER

  - id: SW02_MAP_REPLAY_FUTURE_LEAK
    severity: CRITICAL
    class: state_corruption
    found_by: [codex]
    affects: Map-gated path (walk-forward validation, replay integrity)
    code_refs:
      - "en1gma/control/map_orchestrator.py:128-162"
      - "en1gma/control/map_orchestrator.py:248-306"
    description: |
      run_map_replay() loads ALL bars through end_date, aggregates the full range,
      and initializes MapEngine once from that full dataset. LTF detections are built
      once per kill zone from the full window through kz_end_dt and reused on earlier bars.

      A 02:05 NY bar can be evaluated using regime/PDA built from later dates.
      A chain can complete using MSS/FVG that only appears at 02:40-02:55.
    impact: |
      Forward-contaminated decisions in replay → overstated robustness in walk-forward.
      If replay logic is reused for live, creates impossible future-seeing trades.
      INVALIDATES walk-forward validation results.
    proposed_fix:
      - "Re-initialize Map per trade date from [td-45d, td] only"
      - "Recompute LTF detections incrementally up to current bar, never to kz end"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW03_DAY_STATE_NEVER_WIRED
    severity: CRITICAL
    class: missing_enforcement
    found_by: [opus]
    affects: Map-gated path (DAILY_EXPANSION eligibility, future DAILY_CONTINUATION)
    invariant_violated: INV-DAY-STATE-MARKET-DRIVEN
    spec_refs:
      - "CLAUDE.md:INV-DAY-STATE-MARKET-DRIVEN"
      - "en1gma/control/day_state.py:116 — process_detections() defined but never called"
    code_refs:
      - "en1gma/control/map_orchestrator.py:1-490 (no call to process_detections)"
    description: |
      DayStateEngine.process_detections() is implemented and thoroughly tested
      (18 call sites in test_day_state.py) but NEVER called from map_orchestrator.

      The orchestrator creates DayStateEngine, calls reset(), is_eligible(),
      apply_pending_transition() — but never feeds HTF detections into process_detections().
      The FSM never transitions PRE_EXPANSION → POST_EXPANSION during a session.

      DAILY_EXPANSION remains eligible for the entire session regardless of market structure.
      Only governance max_trades_per_day=1 prevents multiple trades — a risk gate, not
      a market-structure gate. INV-DAY-STATE-MARKET-DRIVEN is dead code.
    impact: |
      1. Market-driven day-state gate is non-functional in production
      2. DAILY_CONTINUATION (requires POST_EXPANSION) can never become eligible
      3. If max_trades_per_day is increased, DAILY_EXPANSION fires multiple times
    proposed_fix:
      - "In map_orchestrator.py, after HTF detection on LTF window bars:"
      - "  day_state_engine.process_detections(ltf_detections)"
      - "Place BEFORE gate evaluation / is_eligible() checks"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  # ─── HIGH ──────────────────────────────────────────────────────────────────

  - id: SW04_PDA_DIRECTION_ZONE_CORRUPTION
    severity: HIGH
    class: state_corruption
    found_by: [codex]
    affects: Map-gated path
    code_refs:
      - "en1gma/context/map_engine.py:405-443"
    description: |
      _initialize_pdas_from_detections() ignores detected FVG direction and exact
      zone fields. Every FVG gets direction_context=regime_dir, and zone boundaries
      are reconstructed as fvg.price ± half_gap instead of detector-provided zone_top/zone_bottom.

      Opposing-direction FVGs can be stamped as same-direction PDAs, classified into
      wrong premium/discount zone, and arm the gate.
    impact: |
      False ARMED states from wrong-direction PDAs. Wrong zone boundaries shift
      gate arming and chain matching thresholds.
    proposed_fix:
      - "Filter FVGs by allowed direction relative to regime"
      - "Populate PDA zones from detector zone_top/zone_bottom with validation"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW — Opus F3 (zone approximation) is a subset of this

  - id: SW05_LIVE_BARS_DROPPED_ON_BURST
    severity: HIGH
    class: silent_failure
    found_by: [codex]
    affects: BOTH paths (ARS + Map-gated) — River is shared infrastructure
    code_refs:
      - "en1gma/data/river.py:155-194"
    description: |
      get_new_bars() advances _last_seen_utc to the newest bar, but next_bar()
      returns only new[0]. If multiple bars arrive between polls (sleep/wake, IO stall),
      later bars are acknowledged internally before the caller sees them.
    impact: |
      After poll delay, 2+ bars land at once → next_bar() returns first, permanently
      skips the rest → missed sweeps, missed SL/TP hits, broken session state.
      THIS AFFECTS PRODUCTION ARS.
    proposed_fix:
      - "Maintain internal queue of unread bars in next_bar()"
      - "Stop mutating _last_seen_utc until all bars consumed by caller"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW06_MAP_PERSISTENCE_LOSES_TERMINAL_PDAS
    severity: HIGH
    class: state_corruption
    found_by: [codex]
    affects: Map-gated path (cross-session persistence)
    code_refs:
      - "en1gma/context/map_persistence.py:45-114"
      - "en1gma/context/map_persistence.py:115-147"
    description: |
      serialize_map_state() stores active_pdas only; all_pdas always emitted as empty.
      Terminal PDA lifecycle state (REJECTED/MITIGATED/INVALIDATED) is discarded on save.
      After restart, previously consumed PDAs disappear from state.
    impact: |
      System can re-arm areas already consumed. Potential duplicate trades against
      stale structure after restart.
    proposed_fix:
      - "Persist full PDA store including terminal states and lifecycle timestamps"
      - "Add restore path that reconstructs complete PDAStore"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW07_CHAIN_TIMEZONE_STRIPPING
    severity: HIGH
    class: edge_case
    found_by: [codex]
    affects: Map-gated path (chain evaluator)
    code_refs:
      - "en1gma/chain/chain_evaluator.py:43-47 (_make_comparable)"
      - "en1gma/chain/chain_evaluator.py:258-267, 292-301, 339-346"
    description: |
      _make_comparable() strips tzinfo with replace(tzinfo=None) instead of converting
      to a common timezone. Sweep/MSS/FVG ordering depends on these comparisons.
      If detections arrive in UTC while current_bar_time is NY-aware (or vice versa),
      timestamps representing different instants can compare equal or inverted.
    impact: |
      Chain accepts future evidence or rejects valid evidence depending on timezone mix.
      Particularly dangerous when River provides UTC bars and detection times are NY.
    proposed_fix:
      - "Normalize all datetimes to UTC before comparison"
      - "Fail fast on naive datetimes unless caller supplies timezone policy"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW08_GOVERNANCE_LEASE_RISK_BYPASSED
    severity: HIGH
    class: invariant_violation
    found_by: [opus, codex]  # BOTH models flagged this independently
    affects: BOTH paths (ARS uses no governance; Map uses halt-only)
    invariant_violated: INV-NO-UNGOVERNED-TRADES
    code_refs:
      - "en1gma/control/orchestrator.py:50-60 (ARS: manual halt only, no check_governance)"
      - "en1gma/control/map_orchestrator.py:310 (Map: check_governance(halt) — no lease/risk)"
      - "en1gma/control/governance.py:35-76 (lease_machine and risk_state silently optional)"
    description: |
      TWO separate gaps, both models flagged:
      1. ARS orchestrator checks halt directly, never calls check_governance() at all
      2. Map orchestrator calls check_governance() but passes only halt — lease and risk
         parameters default to None and are silently skipped

      Governance module degrades silently to halt-only when lease/risk not provided.
      No assertion prevents live deployment without full governance wiring.
    impact: |
      Trades execute without lease validation or risk limit checks. When moving to
      live capital, revoked lease or exceeded risk limits would not block trades.
    proposed_fix:
      - "Route ARS through check_governance() (not manual halt checks)"
      - "Wire LeaseStateMachine + RiskState through Map path"
      - "Add mode parameter: in live mode, require lease/risk to be non-None"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW — both models converged on this independently

  - id: SW09_ARS_RESTART_STATE_LOSS
    severity: HIGH
    class: production_readiness
    found_by: [codex]
    affects: ARS Path A (PRODUCTION daemon)
    code_refs:
      - "en1gma/scripts/run_ars_session.py:94-157"
      - "en1gma/scripts/run_ars_session.py:167-255"
      - "en1gma/scripts/run_ars_session.py:307-321"
    description: |
      Live ARS daemon reconstructs Asia range and sweep state only from bars observed
      after process start. If launchd restarts at 00:30 or 02:15 NY, session loses
      already-collected Asia/sweep state. Can reject valid setup or miss trade entirely.
    impact: |
      "Flat but healthy-looking" production behavior after restart. Operator sees
      no error — system simply doesn't trade because it can't reconstruct context.
      THIS IS PRODUCTION ARS ON M3.
    proposed_fix:
      - "Persist phase state checkpoints"
      - "On startup, backfill current-session bars from parquet/staging before resuming"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  # ─── MEDIUM ────────────────────────────────────────────────────────────────

  - id: SW10_PDA_TIMEFRAME_FILTER_UNENFORCED
    severity: MEDIUM
    class: missing_enforcement
    found_by: [opus]
    affects: Map-gated path
    invariant_violated: INV-MAP-SCOPE-V1.1
    code_refs:

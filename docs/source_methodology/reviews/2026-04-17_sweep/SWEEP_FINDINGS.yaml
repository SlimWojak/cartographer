      - "Enforce all config fields in chain_evaluator or remove unused fields"
    requires_olya_input: false
    prior_ledger_ref: "Overlaps with BUG_LEDGER F1 (min_rr coupling)"

  - id: SW12_MAP_PERSISTENCE_NON_ATOMIC_WRITE

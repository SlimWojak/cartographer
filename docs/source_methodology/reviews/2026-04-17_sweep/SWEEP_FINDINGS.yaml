    found_by: [codex]
    affects: Map-gated path (cross-session persistence)
    code_refs:
      - "en1gma/context/map_persistence.py:158-173"
    description: |
      save_map_state() writes JSON directly with path.write_text(), no temp file,
      fsync, or rename. A crash or concurrent save/load can leave truncated JSON.
    proposed_fix:
      - "Write to temp file, fsync, then atomically rename"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW13_MAX_CHAIN_BARS_UNENFORCED
    severity: MEDIUM
    class: missing_enforcement
    found_by: [opus]
    affects: Map-gated path
    code_refs:
      - "en1gma/chain/chain_config.py:48 (max_chain_bars=24)"
      - "en1gma/chain/chain_evaluator.py:1-526 (never referenced)"
    description: |
      max_chain_bars=24 declared but never checked. A sweep detected 100+ bars
      before current bar can anchor the chain. Stale sweeps from early in kill zone
      connect with current MSS/FVG, producing entries from disconnected events.
    proposed_fix:
      - "Add temporal filter in _match_sweep: reject sweeps older than max_chain_bars"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW14_RIVER_STAGING_SILENT_DROP
    severity: MEDIUM
    class: silent_failure
    found_by: [codex]
    affects: BOTH paths (River is shared infrastructure)
    code_refs:
      - "en1gma/data/river.py:97-125"
    description: |
      load_staging_bars() silently continues on JSON parse errors and OSError.

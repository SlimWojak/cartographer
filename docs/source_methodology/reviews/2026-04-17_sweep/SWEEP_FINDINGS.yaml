    proposed_fix:
      - "Filter candidate PDAs by strategy's declared pda_timeframes in gate evaluation"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW11_CHAIN_CONFIG_PARTIALLY_LOADED
    severity: MEDIUM
    class: config_fragility
    found_by: [opus, codex]  # BOTH flagged independently
    code_refs:
      - "en1gma/strategies/loader.py:162-172 (loads 5 of 12 ChainConfig fields)"
      - "en1gma/chain/chain_config.py:31-48 (12 config fields)"
      - "en1gma/chain/chain_evaluator.py:243-379 (some fields never enforced)"

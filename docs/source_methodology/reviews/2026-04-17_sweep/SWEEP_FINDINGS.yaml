    proposed_fix:
      - "Emit structured warnings/counters for malformed lines"
      - "Fail closed or raise health signal when error threshold exceeded"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  # ─── LOW ───────────────────────────────────────────────────────────────────

  - id: SW15_PDA_STATUS_ENUM_STRING_CONTAINMENT
    severity: LOW
    class: error_handling
    found_by: [opus, codex]  # BOTH flagged independently
    code_refs:
      - "en1gma/context/map_engine.py:375 (pda.status in PDAStatus.MITIGATED)"
    description: |
      Uses string containment check instead of equality. Works by accident because
      no PDAStatus value is a substring of "MITIGATED". Should use == or 'in PDA_TERMINAL_STATES'.
    proposed_fix:
      - "Replace with: pda.status in PDA_TERMINAL_STATES"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW — both models converged

  - id: SW16_ARS_ENTRY_CAP_OPEN_VS_CLOSE

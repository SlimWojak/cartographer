# implementation sprints. They are registered here (not in part_a_runtime_critical
# which is frozen at original sweep scope) so incoming agents see the full
# finding surface without digging through commit history.

post_sweep_additions:

  - id: SW23_UTC_NY_PARQUET_CALENDAR_BOUNDARY
    severity: LOW
    class: latent_temporal
    found_by: opus
    affects: Map-gated path replay at KZ window extremes
    registered: 2026-04-17 (Friday eve handover)
    sweep_status: OPEN — Block 2 (non-blocking)
    description: |
      load_date_range() reads parquet by UTC calendar date, but replay
      filters by NY date. Not a correctness bug today — bars past NY 20:00
      fall outside the existing KZ window scopes. Latent hazard if KZ
      scopes are ever extended.
    block: 2

  - id: SW24_RA_ENGINE_DETECTION_TZ_PRESERVATION
    severity: MEDIUM
    class: source_of_truth_leak
    found_by: opus (via codex SW07 follow-up)
    affects: ra_engine source → chain boundary tz fidelity
    registered: 2026-04-17 (eve handover, as SW07 follow-up candidate)
    sweep_status: CONFIRMED_SHIPPED
    closed: 2026-04-19 (evening)
    commit_chain:
      T1: b984f29  # fix(SW24): ra_engine Detection.time tz-aware contract + source emission (T1)
      T2: f7f0a64  # test(SW24): Detection.time tz-preservation unit suite TG23-TG25 (T2)
      T3: 9b26ec5  # refactor(SW24): remove SW07 boundary shim + TG26 real-River scenario (T3)
    description: |
      ra_engine detectors emitted Detection.time as naive datetimes despite
      the base.py docstring claiming "NY timezone". The SW07 boundary shim
      (chain_evaluator.normalize_detection_times) was stamping naive→NY→UTC
      at map_orchestrator boundary — a masking patch, not a source-of-truth
      fix. Future ra_engine refactors risked re-opening SW07.
    resolution: |
      * Detection.__post_init__ raises ValueError on naive time at construction
        (INV-DETECTION-TIME-TZ-AWARE).
      * Every ra_engine detector routes emission through
        detectors/_common.to_ny_aware() — idempotent on already-aware,
        UTC-aware preserved as instant.
      * SW07 boundary shim's naive-stamping branch REMOVED in T3c along with
        ZoneInfo import, _DEFAULT_ASSUMED_DETECTION_TZ module constant, and
        assume_tz parameter. Helper retains pd.Timestamp → UTC-aware datetime
        coercion.
      * G6 SW02-scope replay determinism (decision_trace + chain_trace)
        byte-identical pre/post T3c.
      * TG22 (SW04 T2 detector schema contract, ca639ba) verified unmodified
        via git log.
    test_delta: "+29 (13 TG23 + 5 TG24 + 8 TG25 + 3 TG26)"
    invariants_registered: [INV-DETECTION-TIME-TZ-AWARE]
    exit_gates: "G1-G7 all PASS"

  - id: SW25_MAP_TIMELINE_NON_DETERMINISM
    severity: LOW
    class: non_determinism_hygiene
    found_by: opus (during SW24 T3d G6 verification)
    affects: map_timeline.jsonl output (observability layer, not runtime)
    registered: 2026-04-19 (post-SW24 CTO ratification)
    sweep_status: OPEN — Block 3 (hygiene)
    description: |
      Two consecutive run_map_replay() invocations on identical code +
      identical input produce different map_timeline.jsonl hashes.
      Pre-existing, reproduces without SW24 changes against deterministic
      inputs.
    correctness_impact_today: NONE
    rationale: |
      SW02's determinism invariant hashes only decision_trace +
      chain_trace; map_timeline is outside that scope. No current
      consumer asserts determinism on map_timeline.
    latent_risk: |
      Future consumers (e.g. Dream Cycle training pipelines, walk-forward
      audit tooling) may hash map_timeline. If they do before SW25 ships,
      they see flakes. Registering now means the finding is named, not
      discovered-again under pressure.
    block: 3
    owner: "TBD — future Opus session"
    prerequisite: |
      identify the non-determinism source (dict iteration order? concurrent
      writer ordering? timestamp-at-write?); single-commit fix likely.
    invariant_if_fixed: INV-MAP-TIMELINE-DETERMINISTIC
    relationship_to_existing: |
      Would extend INV-REPLAY-DETERMINISM scope from {decision_trace,
      chain_trace} to also include {map_timeline}.

  - id: SW01_PDA_MITIGATION_SHIPPED
    # NOTE: SW01 original entry is in part_a_runtime_critical above (severity CRITICAL,
    # found_by opus, semantic_drift class). This post-sweep record captures the
    # SHIPPED status + Monday Olya ruling + commit chain.
    severity: CRITICAL
    class: semantic_drift
    found_by: opus (original sweep 2026-04-17)
    affects: Map-gated path PDA lifecycle (all FVG-based strategies)
    registered: 2026-04-17 (original sweep)
    sweep_status: CONFIRMED_SHIPPED
    closed: 2026-04-20
    commit_chain:
      T1: 55e0d04  # fix(M3.5.1.SW01): swap FVG mitigation semantic to retrace-fill
    olya_ruling:
      date: 2026-04-20 (F2F)
      verdict: "YES SWAP IT"
      scope_confirmation: "v1 applies to FVG mitigation specifically; other PDA types (OB, iFVG, Breaker) deferred"
    description: |
      PDA FVG mitigation semantic was inverted (bearish mitigated on close <
      zone_bottom, bullish on close > zone_top) — expansion-through-zone was
      treated as mitigation. Bullish FVGs over-mitigated immediately on any
      ordinary bullish expansion through zone_top, starving the gate of
      active PDAs and blocking the bullish live path entirely.
    resolution: |
      * Swap mitigation conditions to retrace-fill semantic: bearish mitigates
        on close > zone_top (upward retrace fills from below), bullish
        mitigates on close < zone_bottom (downward retrace fills from above).
      * Applied in parallel at pda_store.update_on_bar_close AND
        map_engine._replay_price_forward (parallel reimplementations, no
        call relationship). Lock-step swap per brief scope discipline; the
        parallel-site duplication is flagged as a separate consolidation
        follow-up (Block 3).
      * Replaced 1 pre-SW01 inverted-behaviour test with 4 explicit cases:
        A (bearish retrace-fill), B (bearish no-mitigate-on-expansion),
        C (bullish retrace-fill), D (bullish no-mitigate-on-expansion).
        Cases C + D exercise paths that were effectively dead under the
        inverted logic.
      * Full suite: 722 pass, zero regressions. 6/6 ground truth PASS,
        302 parametrized advance() parity PASS.
    test_delta: "+3 net (4 new cases A-D replace 1 pre-SW01 inverted test)"
    invariants_registered: [INV-PDA-MITIGATION-IS-RETRACE-FILL]
    exit_gates: "G1-G6 all PASS (T1 scope; T2 hygiene docs separate commit)"
    bullish_live_path: technically_unlocked
    follow_up_candidates:
      PDA_MITIGATION_CONSOLIDATION: |
        pda_store.update_on_bar_close and map_engine._replay_price_forward
        carry IDENTICAL mitigation logic via two independent reimplementations.
        Future consolidation brief should extract a shared helper or have
        map_engine delegate to pda_store. Block 3 hygiene.

  - id: SW26_HEARTBEAT_BOOLEAN_VS_SUBSTANCE_MISMATCH
    severity: MEDIUM
    class: operational_observability
    found_by: [coo, g, cto]
    affects: Sentinel monitoring + River observability
    registered: 2026-04-20 (Monday, surfaced via Sentinel false-positive during P1 verification session)
    sweep_status: OPEN — Block 2 (pre-live hardening)
    correctness_impact_today: NONE
    operational_impact: MEDIUM
    surfacing_context: |
      2026-04-20 first post-weekend ARS session (pin 5854ccd, P1
      verification run). Sentinel fired CRITICAL alert
      "connected=False, subscribed=False" on River heartbeat at ~05:50
      local. COO diagnosed in ~5 minutes: river.streamer PID 62753
      RUNNING, 457 bars received, 0 gaps, 452 consecutive good, last
      bar seconds ago, state STREAMING. ARS checkpoint writing every
      minute. Verdict: FALSE POSITIVE. Heartbeat writer booleans went
      stale while bar flow continued normally. Sentinel read the
      booleans, not the substance.
    code_refs:
      - "river side: heartbeat writer (booleans decoupled from stream substance)"
      - "en1gma/sentinel/sentinel.py::check_river_heartbeat (reads boolean only)"
    description: |
      River writes heartbeat JSON with connected/subscribed boolean flags
      that can go stale/false while bar flow continues normally. Sentinel's
      check_river_heartbeat reads the booleans, not the substance
      (last_bar_time recency). Produces false-positive CRITICAL alerts
      during healthy streaming sessions.
    relationship_to_other_findings:
      SW18: |
        "Sentinel config paths ignored for river_heartbeat/notification_file"
        Related surface (both touch sentinel.py river check) but distinct.
        SW18 = config path reading; SW26 = substance-vs-flag reading.
        RECOMMENDATION: bundle SW18 + SW26 in one brief.
      SW14: |
        "River staging silent drop — no warning on malformed lines"
        Different class (silent drop vs false alarm) but same subsystem.
        Bundle candidate for a broader river-reliability sprint.
    bundling_recommendation: |
      docs/build_docs/BLOCK_2_RIVER_RELIABILITY_M3_5_3.md (sibling of M3_5_2);
      bundle with SW18 + SW14 + tier 1 sentinel improvements.
    proposed_fix_shape: |
      In sentinel.py check_river_heartbeat: read boolean flags AND
      last_bar_time; if connected=False BUT last_bar_time < 2 min old →
      downgrade to WARNING; if connected=False AND last_bar_time > 2 min
      → CRITICAL (true failure); if booleans True but last_bar_time > 5
      min → new CRITICAL class "frozen stream".
    proposed_invariant_for_broader_refactor:
      INV-SENTINEL-SUBSTANCE-OVER-FLAG: |
        "Sentinel health checks verify SUBSTANCE (data flow, state
        progression, last-action-timestamp) not FLAGS (boolean
        declarations by upstream writers). Flags are corroborating
        signals, not authoritative."
    requires_olya_input: false
    block: 2
    owner: "TBD — Block 2 M3_5_3 bundle"



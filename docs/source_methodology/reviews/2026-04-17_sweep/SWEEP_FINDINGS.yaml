    description: |
      Code checks candle OPEN time (ny_open_time.hour >= 3) but Canon checks CLOSE time.
      The 02:55 candle (closes at 03:00) would be allowed by code but rejected by Canon.
      ARS has 151/151 parity so likely doesn't occur in validation set.
    proposed_fix:
      - "Change check to use close time"
      - "Resolve Canon §12 vs §14 inconsistency (> vs >=)"
    requires_olya_input: false
    prior_ledger_ref: null  # NEW

  - id: SW17_ARS_YAML_SCHEMA_MISMATCH
    severity: LOW

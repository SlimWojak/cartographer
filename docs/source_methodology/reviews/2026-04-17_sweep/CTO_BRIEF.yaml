# 1. SYSTEM ARCHITECTURE
# ═══════════════════════════════════════════════════════════════════════════════

architecture:

  spine:
    L1_DATA:
      modules: [data/river.py, data/bar_types.py, data/tf_aggregator.py]
      role: "River → raw 1m bars → canonicalization → TF aggregation"
      live_source: "~/phoenix-river/EURUSD (parquet + staging JSONL)"

    L2_DETECTION:
      modules: [detection/detect.py, "detection/ra_engine/ (39 vendored files)"]
      role: "Sole detection oracle — 13 vLOCK primitives, all TFs"
      invariant: INV-DETECTION-AUTHORITY-SINGLETON
      config: "detection/locked_baseline.yaml"

    L3_CONTEXT:
      modules:
        - context/map_engine.py      # "composes regime + DR + PDA store"
        - context/regime.py           # "direction + phase + authority TF"
        - context/dealing_range.py    # "wick-to-wick, rolling cycle model"
        - context/pda_store.py        # "5-state lifecycle: OPEN→TOUCHED→REJECTED|MITIGATED|INVALIDATED"
        - context/map_persistence.py  # "JSON cross-session state"
        - context/liquidity.py        # "STUB — NotImplementedError, awaiting Olya Q9-Q11"
      role: "Persistent spatial worldview (the Map / slow clock)"
      note: "ARS Path A BYPASSES this layer entirely (DEC-ARS-BYPASSES-MAP)"

    L4_GATING_EXECUTION:
      modules:
        - gating/execution_gate.py    # "4-condition boolean gate"
        - chain/chain_evaluator.py    # "sweep→MSS→FVG→OTE universal chain"
        - chain/chain_config.py       # "strategy-level chain tuning"
        - chain/ars/ars_canon.py      # "self-contained ARS v1.3 algorithm"
        - execution/intent_builder.py # "TradeIntent from ARS or chain"
        - control/orchestrator.py     # "Path A sequencing"
        - control/map_orchestrator.py # "Path B sequencing"
        - control/day_state.py        # "2-state FSM: PRE/POST_EXPANSION"
      role: "Gate (boolean) → LTF chain or ARS canon → intent construction"

    L5_GOVERNANCE:
      modules:
        - control/halt.py             # "<50ms kill switch"
        - control/lease.py            # "bounded autonomy FSM"
        - control/risk.py             # "max trades, drawdown, consecutive losses"
        - control/governance.py       # "packaged halt+lease+risk gate"
        - execution/broker_adapter.py # "paper broker, immediate fills"
      role: "ALL capital actions pass through this layer"
      invariants: [INV-HALT-1, INV-HALT-2, INV-HALT-OVERRIDES-ALL, INV-NO-UNGOVERNED-TRADES]

  two_clock_model:
    ref: "docs/NORTH_STAR.md §3"
    slow_clock:
      name: "The Map"
      updates_on: "structural events only (daily MSS, FVG mitigated, regime change)"
      persistence: "cross-session — objects live days/weeks"
      answers: "WHERE should we watch, WHICH direction"
    fast_clock:
      name: "The Execution"
      updates_on: "per-bar within kill zones"
      persistence: "intraday — resets each session"
      answers: "HOW do we enter, right now, at this location"
    separation_rule: "Map never fires a trade. Execution never decides direction."

  execution_paths:

    path_a_ars:
      route: "River → ars_canon.py → halt check → PaperBroker"
      entry_point: "scripts/run_ars_session.py:run_live_session"
      sequencer: "control/orchestrator.py:run_ars_session"
      algorithm: "chain/ars/ars_canon.py:process_session"
      map_required: false
      governance_actual: "halt_signal.check() + check_halt_signal() — NO check_governance()"
      status: LIVE_PAPER_ON_M3

    path_b_map_gated:
      route: "River → detect.py(HTF) → Map → DayState → detect.py(LTF) → Gate → Chain → Intent → Governance → Broker → PDA write-back → Trace"
      entry_point: "control/map_orchestrator.py:run_map_replay"
      map_required: true
      governance_actual: "check_governance(halt) — lease=None, risk=None silently skipped"
      status: OPERATIONAL_REPLAY_ONLY

  observability:
    decision_trace: "observe/decision_trace.py → JSONL per session"
    map_timeline: "observe/map_timeline.py → JSONL structural events (11 types)"
    chain_trace: "emitted by map_orchestrator → chain_trace.jsonl"
    replay: "observe/replay.py — INV-REPLAY-DETERMINISM proven"
    sentinel: "scripts/sentinel.py — Gemma-powered 5-min cron monitor"
    henry: "scripts/henry_analyst.py — GLM-5.1 offline forensic analyst"

